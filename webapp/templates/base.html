<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}LeakEngine{% endblock %}</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f1a; color: #e0e0e0; min-height: 100vh; }

  /* Nav */
  nav { background: #1a1a2e; border-bottom: 1px solid #2a2a4a; padding: 0 16px; display: flex; align-items: center; height: 56px; overflow-x: auto; -webkit-overflow-scrolling: touch; white-space: nowrap; }
  nav .logo { font-size: 18px; font-weight: 800; color: #00d4aa; margin-right: 20px; flex-shrink: 0; }
  nav a { color: #8888aa; text-decoration: none; font-size: 14px; font-weight: 500; padding: 16px 10px; border-bottom: 2px solid transparent; transition: all 0.2s; flex-shrink: 0; }
  nav a:hover, nav a.active { color: #e0e0e0; border-bottom-color: #00d4aa; }
  nav .spacer { flex: 1; min-width: 8px; }
  nav .status { font-size: 12px; color: #666; flex-shrink: 0; }

  /* Layout */
  .container { max-width: 1200px; margin: 0 auto; padding: 16px; }

  /* Cards */
  .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
  .stat-card { background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 12px; padding: 16px; }
  .stat-card .label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-card .value { font-size: 28px; font-weight: 800; margin-top: 4px; }
  .stat-card .value.green { color: #00d4aa; }
  .stat-card .value.red { color: #ff4757; }
  .stat-card .value.yellow { color: #ffa502; }
  .stat-card .value.blue { color: #3498db; }

  /* Table */
  .table-wrap { background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 12px; overflow: hidden; margin-bottom: 16px; }
  .table-header { padding: 14px 16px; border-bottom: 1px solid #2a2a4a; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
  .table-header h2 { font-size: 15px; font-weight: 700; }
  .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  table { width: 100%; border-collapse: collapse; min-width: 500px; }
  th { text-align: left; padding: 10px 14px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #666; border-bottom: 1px solid #2a2a4a; white-space: nowrap; }
  td { padding: 12px 14px; border-bottom: 1px solid #1f1f35; font-size: 13px; }
  tr:hover { background: #1f1f35; }
  tr:last-child td { border-bottom: none; }

  /* Badges */
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
  .badge.critical { background: #ff4757; color: white; }
  .badge.high { background: #e67e22; color: white; }
  .badge.medium { background: #ffa502; color: #333; }
  .badge.low { background: #3498db; color: white; }

  /* Score */
  .score { display: inline-block; font-weight: 800; font-size: 16px; }
  .score.bad { color: #ff4757; }
  .score.ok { color: #ffa502; }
  .score.good { color: #00d4aa; }

  /* Buttons */
  .btn { display: inline-block; padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 600; text-decoration: none; cursor: pointer; border: none; transition: all 0.2s; white-space: nowrap; }
  .btn-primary { background: #00d4aa; color: #0f0f1a; }
  .btn-primary:hover { background: #00e6b8; }
  .btn-secondary { background: #2a2a4a; color: #e0e0e0; }
  .btn-secondary:hover { background: #3a3a5a; }
  .btn-sm { padding: 4px 10px; font-size: 12px; }
  .btn-danger { background: #ff4757; color: white; }

  /* Forms */
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px 12px; background: #0f0f1a; border: 1px solid #2a2a4a; border-radius: 6px; color: #e0e0e0; font-size: 14px; }
  .form-group input:focus, .form-group textarea:focus { outline: none; border-color: #00d4aa; }

  /* Panels */
  .panel { background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
  .panel h3 { font-size: 14px; font-weight: 700; margin-bottom: 12px; }

  /* Leak detail */
  .leak-item { padding: 12px; margin-bottom: 8px; border-radius: 8px; border-left: 3px solid #2a2a4a; background: #12121f; }
  .leak-item.critical { border-left-color: #ff4757; }
  .leak-item.high { border-left-color: #e67e22; }
  .leak-item.medium { border-left-color: #ffa502; }
  .leak-item.low { border-left-color: #3498db; }
  .leak-item .leak-title { font-weight: 700; font-size: 13px; margin-bottom: 4px; }
  .leak-item .leak-desc { font-size: 13px; color: #999; line-height: 1.5; }
  .leak-item .leak-fix { font-size: 12px; color: #00d4aa; margin-top: 6px; line-height: 1.4; }
  .leak-item .leak-impact { font-size: 11px; color: #ffa502; margin-top: 4px; }

  /* Utility */
  .text-muted { color: #666; }
  .text-sm { font-size: 12px; }
  .mt-16 { margin-top: 16px; }
  .mb-16 { margin-bottom: 16px; }
  .flex { display: flex; flex-wrap: wrap; }
  .gap-8 { gap: 8px; }
  .gap-16 { gap: 16px; }
  .items-center { align-items: center; }
  a { color: #00d4aa; text-decoration: none; }
  a:hover { text-decoration: underline; }
  .url-truncate { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: block; }

  /* Pipeline status */
  .pipeline-status { display: flex; align-items: center; gap: 8px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; }
  .status-dot.running { background: #00d4aa; animation: pulse 1.5s infinite; }
  .status-dot.idle { background: #666; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* Empty state */
  .empty-state { text-align: center; padding: 40px 16px; color: #666; }
  .empty-state h3 { font-size: 18px; color: #888; margin-bottom: 8px; }
  .empty-state p { font-size: 14px; margin-bottom: 20px; line-height: 1.5; }

  /* Mobile */
  @media (min-width: 640px) {
    .container { padding: 24px; }
    .stats-grid { grid-template-columns: repeat(4, 1fr); }
    .stat-card .value { font-size: 32px; }
    .url-truncate { max-width: 300px; }
    nav { padding: 0 24px; }
    nav a { padding: 16px 12px; }
  }
  @media (max-width: 639px) {
    nav .status { display: none; }
    h1 { font-size: 18px !important; }
    .form-grid { grid-template-columns: 1fr !important; }
  }

  /* Loading overlay */
  #loading-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(15,15,26,0.9); z-index: 1000; align-items: center; justify-content: center; }
  #loading-overlay .spinner { width: 44px; height: 44px; border: 3px solid #2a2a4a; border-top-color: #00d4aa; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-btn.is-loading { opacity: 0.5; pointer-events: none; }
</style>
</head>
<body>
<div id="loading-overlay">
  <div style="text-align: center; padding: 20px;">
    <div class="spinner"></div>
    <div id="loading-text" style="font-size: 16px; font-weight: 600; color: #e0e0e0;">Working...</div>
    <div style="font-size: 13px; color: #666; margin-top: 8px;">This may take 15-30 seconds</div>
  </div>
</div>
<script>
function startLoading(el, text) {
  el.classList.add('is-loading');
  document.getElementById('loading-overlay').style.display = 'flex';
  document.getElementById('loading-text').textContent = text || 'Working...';
}
function submitWithLoading(form, text) {
  document.getElementById('loading-overlay').style.display = 'flex';
  document.getElementById('loading-text').textContent = text || 'Working...';
  form.submit();
}
</script>
<nav>
  <span class="logo">LeakEngine</span>
  <a href="/" class="{{ 'active' if active_page == 'dashboard' }}">Dashboard</a>
  <a href="/prospects" class="{{ 'active' if active_page == 'prospects' }}">Prospects</a>
  <a href="/audits" class="{{ 'active' if active_page == 'audits' }}">Audits</a>
  <a href="/pipeline" class="{{ 'active' if active_page == 'pipeline' }}">Pipeline</a>
  <span class="spacer"></span>
  <span class="status text-sm text-muted">{{ total_prospects }} prospects &middot; {{ total_audits }} audits</span>
</nav>
<div class="container">
  {% block content %}{% endblock %}
</div>
</body>
</html>
